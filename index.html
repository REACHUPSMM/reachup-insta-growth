<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reachup</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP LIVE -->
<div class="topbar">
 🔴 <span id="liveCount">150</span> users watching now
</div>

<!-- BRAND -->
<h1 class="brand">REACHUP 🚀</h1>

<!-- CENTER BUTTONS -->
<div class="center">
  <button onclick="openPage('followers')">FOLLOWERS</button>
  <button onclick="openPage('views')">VIEWS</button>
  <button onclick="openPage('likes')">LIKES</button>
  <button onclick="openPage('comments')">COMMENTS</button>
</div>

<!-- STEPS (BOTTOM) -->
<div class="steps">
  <h2>How to Order</h2>
  <p>1. Select Service</p>
  <p>2. Scan & Pay</p>
  <p>3. Enter Instagram ID</p>
  <p>4. Click Payment Done</p>
  <p>5. Send Screenshot in WhatsApp</p>
</div>

<!-- FOLLOWERS -->
<div id="followers" class="section hidden">
  <h2>Followers</h2>
  <div class="card">1K ₹100 <button onclick="buy('1K Cheap Followers ₹100')">Buy</button></div>
  <div class="card">5K ₹450 <button onclick="buy('5K Cheap Followers ₹450')">Buy</button></div>
</div>

<!-- VIEWS -->
<div id="views" class="section hidden">
  <div class="card">1K ₹15 <button onclick="buy('1K Views ₹15')">Buy</button></div>
</div>

<!-- LIKES -->
<div id="likes" class="section hidden">
  <div class="card">1K ₹50 <button onclick="buy('1K Likes ₹50')">Buy</button></div>
</div>

<!-- COMMENTS -->
<div id="comments" class="section hidden">
  <div class="card">1K ₹250 <button onclick="buy('1K Comments ₹250')">Buy</button></div>
</div>

<!-- PAYMENT -->
<div id="payment" class="payment hidden">
  <h2>Complete Payment</h2>
  <img src="https://i.postimg.cc/zfYTYVsX/Screenshot-20260323-194707-Upi-Links.png" class="qr">
  <input id="insta" placeholder="Enter Instagram ID">
  <button onclick="done()">Payment Done</button>
</div>

<script src="script.js"></script>
</body>
</html>
